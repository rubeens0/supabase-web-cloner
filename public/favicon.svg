<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified "X" logo with motion lines for karting brand -->
  
  <!-- Motion curve top right -->
  <path d="M350 120 Q 420 100, 480 140" stroke="white" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M360 130 Q 430 110, 490 150" stroke="white" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Main X -->
  <path d="M180 140 L 332 372" stroke="white" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M332 140 L 180 372" stroke="white" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Motion curve bottom left -->
  <path d="M162 392 Q 92 412, 32 372" stroke="white" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M152 382 Q 82 402, 22 362" stroke="white" stroke-width="6" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Accent glow effect (for modern look) -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.05"/>
  
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
